<script type="module">
import { Muxer, ArrayBufferTarget } from 'https://cdn.jsdelivr.net/npm/mp4-muxer@5.1.3/+esm';

const CANVAS_W = 1080;
const CANVAS_H = 1920;
const FPS = 30;
const AUDIO_SR = 44100;
const NOTE_USER = 'takeshityan';

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
let videoBlob = null;

const $ = id => document.getElementById(id);
const st = msg => { $('status').textContent = msg; };
function setProgress(pct) {
  $('progress-bar').style.width = pct + '%';
  $('progress-wrap').style.display = 'block';
}

// ==== テキスト折り返し ====
function wrapText(text, x, y, maxW, lineH, maxLines, color) {
  ctx.fillStyle = color;
  let drawn = 0;
  for (const line of text.split('\n')) {
    if (!line.trim()) { y += lineH * 0.5; continue; }
    let cur = '';
    for (const ch of line) {
      const test = cur + ch;
      if (ctx.measureText(test).width > maxW && cur) {
        if (drawn++ < maxLines) ctx.fillText(cur, x, y);
        y += lineH; cur = ch;
      } else cur = test;
    }
    if (cur && drawn++ < maxLines) ctx.fillText(cur, x, y);
    y += lineH;
  }
}

// ==== スライド描画 ====
function drawSlide(bgImg, text, type, idx = 0) {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

  // AI背景画像 or おしゃれなグラデーション
  if (bgImg) {
    ctx.drawImage(bgImg, 0, 0, CANVAS_W, CANVAS_H);
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  } else {
    drawFallbackBg(idx);
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  }

  // テキストエリアの可読性を高める下部グラデーション
  const bot = ctx.createLinearGradient(0, CANVAS_H * 0.36, 0, CANVAS_H);
  bot.addColorStop(0, 'rgba(0,0,0,0)');
  bot.addColorStop(0.4, 'rgba(0,0,0,0.48)');
  bot.addColorStop(1, 'rgba(0,0,0,0.82)');
  ctx.fillStyle = bot;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,0,0,0.85)'; ctx.shadowBlur = 22; ctx.shadowOffsetY = 4;

  if (type === 'title') {
    ctx.font = '500 38px -apple-system, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.62)';
    ctx.fillText('最新note', CANVAS_W / 2, 730);
    ctx.font = 'bold 82px -apple-system, sans-serif';
    wrapText(text, CANVAS_W/2, 865, 930, 112, 5, '#ffffff');
  } else if (type === 'cta') {
    ctx.font = 'bold 72px -apple-system, sans-serif';
    ctx.fillStyle = '#FFD700';
    ctx.fillText('続きはnoteで読む', CANVAS_W/2, 860);
    ctx.font = '600 46px -apple-system, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.fillText('note.com/takeshityan', CANVAS_W/2, 975);
    ctx.font = '500 38px -apple-system, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.52)';
    ctx.fillText(`@${NOTE_USER}`, CANVAS_W/2, 1065);
  } else if (type === 'hook') {
    ctx.font = '500 38px -apple-system, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.72)';
    ctx.fillText('今日のテーマ', CANVAS_W/2, 715);
    ctx.font = 'bold 90px -apple-system, sans-serif';
    wrapText(text, CANVAS_W/2, 865, 930, 124, 5, '#FFD700');
  } else {
    ctx.font = '600 80px -apple-system, sans-serif';
    wrapText(text, CANVAS_W/2, 615, 930, 112, 12, '#ffffff');
  }
  ctx.shadowBlur = 0;
}

// ==== RSS取得（記事一覧 + keyを取得） ====
async function fetchLatestArticle() {
  st('最新記事を取得中...');
  const api = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(`https://note.com/${NOTE_USER}/rss`)}`;
  const res = await fetch(api);
  if (!res.ok) throw new Error('RSS取得に失敗しました');
  const data = await res.json();
  if (data.status !== 'ok' || !data.items?.length) throw new Error('記事が見つかりません');
  return data.items[0];
}

// ==== note APIで全文取得 ====
async function fetchFullBody(articleUrl) {
  // URLからkeyを抽出 (例: https://note.com/takeshityan/n/nXXXXX → nXXXXX)
  const match = articleUrl.match(/\/n\/([a-zA-Z0-9]+)/);
  if (!match) return null;
  const key = match[1];
  try {
    const res = await fetch(`/note_body?key=${key}`);
    if (!res.ok) return null;
    const data = await res.json();
    return data?.data?.body || null;
  } catch { return null; }
}

function extractText(html) {
  return new DOMParser().parseFromString(html.replace(/<br\s*\/?>/gi, '\n'), 'text/html').body.textContent.trim();
}

// ==== 台本構築：段落単位で自然な区切りを作る ====
function buildScript(fullText) {
  // 改行で段落に分割
  const paragraphs = fullText
    .split(/\n+/)
    .map(p => p.trim())
    .filter(p => p.length > 8);

  if (!paragraphs.length) return [fullText];

  // 段落を意味のあるチャンクに結合（1チャンク = 読み上げ約8〜12秒 = 60〜90文字目安）
  const MAX_CHARS = 85;
  const chunks = [];
  let buf = '';

  for (const para of paragraphs) {
    // 段落が長い場合は。！？で分割してから処理
    const sentences = para.split(/(?<=[。！？])/g).map(s => s.trim()).filter(s => s.length > 3);
    for (const sent of sentences) {
      if ((buf + sent).length <= MAX_CHARS) {
        buf += sent;
      } else {
        if (buf) chunks.push(buf.trim());
        // 1文が長すぎる場合もそのまま入れる
        buf = sent.length > MAX_CHARS ? sent.slice(0, MAX_CHARS) : sent;
      }
    }
    // 段落の終わりでチャンクを区切る
    if (buf) {
      chunks.push(buf.trim());
      buf = '';
    }
  }
  if (buf.trim()) chunks.push(buf.trim());
  return chunks;
}

function buildSlides(title, fullText) {
  const slides = [{ type: 'title', text: title }];

  // hookスライド：タイトルから「〇〇で悩んでいませんか？」を生成
  const hookBase = title
    .replace(/――.*$/, '')           // ――以降を削除
    .replace(/[、。！？]/g, '')
    .replace(/[　 ]*[をにはがのもでてや].{0,10}$/, '')
    .slice(0, 22);
  slides.push({ type: 'hook', text: hookBase + 'で\n悩んでいませんか？' });

  // 台本を段落単位で構築
  const chunks = buildScript(fullText);

  // 120秒に収まる目安：1チャンク約8秒 → 最大13チャンク = 104秒 + タイトル+hook+cta約15秒 = 119秒
  const MAX_CHUNKS = 13;
  chunks.slice(0, MAX_CHUNKS).forEach(chunk => {
    slides.push({ type: 'body', text: chunk });
  });

  slides.push({ type: 'cta', text: '続きはnoteで読む' });
  return slides;
}

// ==== おしゃれなグラデーション背景（AI画像フォールバック用） ====
const GRAD_THEMES = [
  ['#0f0c29','#302b63','#764ba2'],  // ディープパープル
  ['#0a3d62','#1e5f74','#11998e'],  // オーシャン→ティール
  ['#200122','#6f0000','#200122'],  // ダークレッド
  ['#2c3e50','#3498db','#2c3e50'],  // ミッドナイトブルー
  ['#1d2b64','#f8cdda','#1d2b64'],  // サンセットピンク
  ['#0f2027','#2c5364','#203a43'],  // スレートブルー
  ['#1a1a2e','#e94560','#1a1a2e'],  // ネオンピンク
  ['#134e5e','#71b280','#134e5e'],  // フォレストグリーン
];

function drawFallbackBg(idx) {
  const [c1, c2, c3] = GRAD_THEMES[idx % GRAD_THEMES.length];
  const g = ctx.createLinearGradient(0, 0, CANVAS_W, CANVAS_H);
  g.addColorStop(0, c1); g.addColorStop(0.5, c2); g.addColorStop(1, c3);
  ctx.fillStyle = g; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // 装飾的な光の玉・グロー効果
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  const addGlow = (x, y, r, color) => {
    const rg = ctx.createRadialGradient(x, y, 0, x, y, r);
    rg.addColorStop(0, color); rg.addColorStop(1, 'transparent');
    ctx.fillStyle = rg; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  };
  addGlow(CANVAS_W * 0.25, CANVAS_H * 0.28, 650, 'rgba(255,255,255,0.14)');
  addGlow(CANVAS_W * 0.75, CANVAS_H * 0.72, 550, 'rgba(255,255,255,0.10)');
  addGlow(CANVAS_W * 0.5,  CANVAS_H * 0.5,  900, 'rgba(100,160,255,0.07)');
  ctx.restore();
}

// ==== 日本語テキスト → 英語イメージプロンプト変換 ====

    [/睡眠|眠り|眠れ|不眠|熟睡/,          'peaceful bedroom at night, cozy pillow, moonlight through curtain, soft blue tones, sleep wellness'],

    [/ホルモン|自律神経|ストレス|副腎/,    'calm nature scene, zen stones in water, balance harmony, soft green forest light, meditation'],
    [/免疫|感染|菌|ウイルス|抗体/,        'green herbal tea, lemon, ginger, honey, immunity boost, warm and healthy, wooden background'],
    [/妊活|妊娠|不妊|生理|子宮/,          'white flower blooming, soft pink bokeh, hope and life, gentle spring morning, pastel tones'],
    [/血流|血液|循環|冷え|冷え性/,         'warm hot water footbath, steam rising, cozy winter wellness, soft orange light'],
    [/メンタル|精神|心|うつ|不安|感情/,    'calm meditation by window, soft morning light, mindfulness, peace of mind, indoor plant'],
    [/骨盤|姿勢|歪み|矯正/,               'good posture silhouette, body alignment, spine health, professional photo, clean white background'],
    [/花粉|アレルギー|炎症|かゆみ/,        'spring flowers, nature, immune response, herbal medicine, soft light bokeh'],
    [/更年期|女性|生理|ホルモン/,          'mature woman relaxing in nature, calm and confident, soft warm light, wellness lifestyle'],

// ==== AI背景画像を1枚取得（プロンプト指定・長めタイムアウト） ====
async function fetchOneImage(prompt, seed) {
  const url = `/img?prompt=${encodeURIComponent(prompt)}&seed=${seed}`;
  try {
    const res = await Promise.race([
      fetch(url),
      new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 90000))
    ]);
    if (!res.ok) return null;
    const blob = await res.blob();
    if (blob.size < 5000) return null; // 壊れた画像を除外
    const objUrl = URL.createObjectURL(blob);
    return await new Promise((resolve) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => resolve(null);
      setTimeout(() => resolve(null), 10000);
      img.src = objUrl;
    });
  } catch(e) { console.warn('画像取得失敗:', prompt.slice(0,40), e.message); return null; }
}

// ==== 全スライドの背景画像をまとめて取得（同じ内容は使い回し） ====
async function prefetchAllImages(slides) {
  // 各スライドのプロンプトを決定
  const slidePrompts = slides.map(s => buildImagePrompt(s.text));

  // ユニークなプロンプトだけ抽出
  const uniquePrompts = [...new Set(slidePrompts)];
  console.log(`画像取得: ${slides.length}スライド → ${uniquePrompts.length}種類のユニーク画像`);

  // 1枚ずつ順番に取得（API負荷を分散）
  const imageMap = new Map();
  for (let i = 0; i < uniquePrompts.length; i++) {
    const prompt = uniquePrompts[i];
    st(`背景画像を生成中... (${i + 1}/${uniquePrompts.length})`);

    let img = null;
    // 最大3回リトライ（seedを変えて）
    for (let retry = 0; retry < 3 && !img; retry++) {
      const seed = i * 17 + 42 + retry * 333;
      if (retry > 0) {
        st(`背景画像をリトライ中... (${i + 1}/${uniquePrompts.length} - ${retry + 1}回目)`);
        console.log(`リトライ ${retry + 1}: ${prompt.slice(0, 40)}...`);
        await new Promise(r => setTimeout(r, 2000)); // 2秒待ってからリトライ
      }
      img = await fetchOneImage(prompt, seed);
    }

    imageMap.set(prompt, img);
    if (img) console.log(`✅ 画像取得成功: ${prompt.slice(0, 40)}...`);
    else     console.log(`❌ 画像取得失敗: ${prompt.slice(0, 40)}...`);

    // 次のリクエストの間に1秒待つ（レートリミット対策）
    if (i < uniquePrompts.length - 1) await new Promise(r => setTimeout(r, 1000));
  }

  const successCount = [...imageMap.values()].filter(v => v).length;
  console.log(`画像取得完了: ${successCount}/${uniquePrompts.length} 成功`);

  // 取得できなかった分は、取得済みの画像で埋める（背景なしをゼロにする）
  const anySuccess = [...imageMap.values()].find(v => v) || null;
  if (anySuccess) {
    for (const [prompt, img] of imageMap) {
      if (!img) {
        imageMap.set(prompt, anySuccess);
        console.log(`🔄 フォールバック適用: ${prompt.slice(0, 40)}...`);
      }
    }
  }

  // 各スライドに対応する画像を返す
  return slides.map(s => imageMap.get(buildImagePrompt(s.text)) || null);
}

// ==== TTS音声取得 → デコード ====
async function fetchAndDecodeTTS(text) {
  const trimmed = text.replace(/\n/g, '。').slice(0, 180);
  const res = await fetch(`/tts?q=${encodeURIComponent(trimmed)}`);
  if (!res.ok) throw new Error('TTS取得失敗');
  const arrayBuf = await res.arrayBuffer();
  // デコード → 44100Hz mono
  const offCtx = new OfflineAudioContext(1, 1, AUDIO_SR);
  const decoded = await offCtx.decodeAudioData(arrayBuf);
  if (decoded.sampleRate === AUDIO_SR) return decoded.getChannelData(0);
  const resampleCtx = new OfflineAudioContext(1, Math.ceil(decoded.duration * AUDIO_SR), AUDIO_SR);
  const src = resampleCtx.createBufferSource();
  src.buffer = decoded; src.connect(resampleCtx.destination); src.start();
  return (await resampleCtx.startRendering()).getChannelData(0);
}

function silencePCM(sec) { return new Float32Array(Math.ceil(sec * AUDIO_SR)); }

// ==== 全スライドの音声+画像を準備 ====
async function prepareSlides(slides) {
  // ステップ1: 背景画像をまとめて並列取得（同じ内容は使い回し）
  const bgImages = await prefetchAllImages(slides);
  setProgress(25);

  // ステップ2: 各スライドの音声を順番に生成
  const results = [];
  const MAX_DURATION = 118;

  for (let i = 0; i < slides.length; i++) {
    const s = slides[i];
    const ttsText = s.type === 'cta' ? '続きはnoteで読む。たけしちゃん' : s.text;
    let pcm;
    try {
      st(`音声を生成中... (${i + 1} / ${slides.length})`);
      pcm = await fetchAndDecodeTTS(ttsText);
    } catch (e) {
      console.warn('TTS failed:', e);
      pcm = silencePCM(4);
    }

    const silence = silencePCM(0.5);
    const combined = new Float32Array(pcm.length + silence.length);
    combined.set(pcm); combined.set(silence, pcm.length);

    // 制限時間を超えそうならスキップ（CTAは必ず入れる）
    const currentTotal = results.reduce((a, r) => a + r.durationSec, 0) + combined.length / AUDIO_SR;
    if (currentTotal > MAX_DURATION && results.length > 0 && s.type !== 'cta') {
      setProgress(25 + Math.round((i / slides.length) * 20));
      continue;
    }

    results.push({
      pcm: combined,
      durationSec: combined.length / AUDIO_SR,
      bgImg: bgImages[i],
      text: s.text,
      type: s.type,
    });

    setProgress(25 + Math.round((i / slides.length) * 20));
  }

  return results;
}

// ==== MP4エンコード（映像 + 音声） ====
async function encodeMP4(prepared) {
  const target = new ArrayBufferTarget();

  // 音声全体を結合
  const totalAudioLen = prepared.reduce((a, p) => a + p.pcm.length, 0);
  const fullAudio = new Float32Array(totalAudioLen);
  let offset = 0;
  for (const p of prepared) { fullAudio.set(p.pcm, offset); offset += p.pcm.length; }

  const totalDurationSec = totalAudioLen / AUDIO_SR;
  const totalVideoFrames = Math.ceil(totalDurationSec * FPS);

  const muxer = new Muxer({
    target,
    video: { codec: 'avc', width: CANVAS_W, height: CANVAS_H },
    audio: { codec: 'aac', numberOfChannels: 1, sampleRate: AUDIO_SR },
    fastStart: 'in-memory',
  });

  const videoEncoder = new VideoEncoder({
    output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
    error: (e) => { throw e; },
  });
  videoEncoder.configure({
    codec: 'avc1.640028',
    width: CANVAS_W, height: CANVAS_H,
    bitrate: 4_000_000, framerate: FPS,
  });

  const audioEncoder = new AudioEncoder({
    output: (chunk, meta) => muxer.addAudioChunk(chunk, meta),
    error: (e) => { throw e; },
  });
  audioEncoder.configure({
    codec: 'mp4a.40.2',
    numberOfChannels: 1,
    sampleRate: AUDIO_SR,
    bitrate: 128_000,
  });

  // ==== 音声エンコード ====
  st('音声をエンコード中...');
  const AUDIO_CHUNK = 1024;
  for (let i = 0; i < fullAudio.length; i += AUDIO_CHUNK) {
    const len = Math.min(AUDIO_CHUNK, fullAudio.length - i);
    const chunk = fullAudio.slice(i, i + len);
    const audioData = new AudioData({
      format: 'f32-planar',
      sampleRate: AUDIO_SR,
      numberOfFrames: chunk.length,
      numberOfChannels: 1,
      timestamp: Math.round((i / AUDIO_SR) * 1_000_000),
      data: chunk,
    });
    audioEncoder.encode(audioData);
    audioData.close();

    if (i % (AUDIO_CHUNK * 100) === 0) {
      await audioEncoder.flush();
      await new Promise(r => setTimeout(r, 0));
    }
  }
  await audioEncoder.flush();

  // ==== 映像エンコード ====
  st('映像をエンコード中...');
  let frameCount = 0;
  let accTime = 0;
  const FADE_FRAMES = 12; // 0.4秒フェードトランジション

  // フェード合成用のオフスクリーンキャンバス
  const blendCanvas = document.createElement('canvas');
  blendCanvas.width = CANVAS_W; blendCanvas.height = CANVAS_H;
  const blendCtx = blendCanvas.getContext('2d');

  for (let si = 0; si < prepared.length; si++) {
    const p = prepared[si];
    const isLast = si === prepared.length - 1;
    drawSlide(p.bgImg, p.text, p.type, si);
    $('slide-info').textContent = `${si + 1} / ${prepared.length}`;

    const numFrames = Math.ceil(p.durationSec * FPS);
    const staticFrames = isLast ? numFrames : Math.max(numFrames - FADE_FRAMES, 1);

    // 静止フレームをエンコード
    for (let f = 0; f < staticFrames; f++) {
      const timestamp = Math.round((accTime + f / FPS) * 1_000_000);
      const frame = new VideoFrame(canvas, { timestamp, duration: Math.round(1_000_000 / FPS) });
      videoEncoder.encode(frame, { keyFrame: f === 0 });
      frame.close();
      frameCount++;

      if (f % 15 === 14) {
        await videoEncoder.flush();
        setProgress(50 + Math.round((frameCount / totalVideoFrames) * 45));
        await new Promise(r => setTimeout(r, 0));
      }
    }

    // フェードトランジション（最終スライド以外）
    if (!isLast) {
      // 現在スライドをブレンドキャンバスに保存
      blendCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
      blendCtx.drawImage(canvas, 0, 0);
      const nextP = prepared[si + 1];

      for (let f = 0; f < FADE_FRAMES; f++) {
        const alpha = 1 - (f / FADE_FRAMES); // 現在スライドの不透明度（1→0）
        // 次スライドを描画（ベース）
        drawSlide(nextP.bgImg, nextP.text, nextP.type, si + 1);
        // 現在スライドを上からフェードアウト合成
        ctx.globalAlpha = alpha;
        ctx.drawImage(blendCanvas, 0, 0);
        ctx.globalAlpha = 1;

        const timestamp = Math.round((accTime + (staticFrames + f) / FPS) * 1_000_000);
        const frame = new VideoFrame(canvas, { timestamp, duration: Math.round(1_000_000 / FPS) });
        videoEncoder.encode(frame, { keyFrame: false });
        frame.close();
        frameCount++;
      }
      await videoEncoder.flush();
      setProgress(50 + Math.round((frameCount / totalVideoFrames) * 45));
      await new Promise(r => setTimeout(r, 0));
    }

    accTime += p.durationSec;
  }

  await videoEncoder.flush();
  videoEncoder.close();
  audioEncoder.close();
  muxer.finalize();

  return new Blob([target.buffer], { type: 'video/mp4' });
}

// ==== メイン ====
window.generate = async function() {
  const btn = $('gen-btn');
  btn.disabled = true; videoBlob = null;
  $('dl-btn').style.display = 'none';
  $('canvas-wrap').style.display = 'none';
  $('progress-wrap').style.display = 'block';
  setProgress(5);

  try {
    if (typeof VideoEncoder === 'undefined' || typeof AudioEncoder === 'undefined')
      throw new Error('Chromeで開いてください（WebCodecs必須）');

    const item = await fetchLatestArticle();
    // note APIで全文取得を試みる（失敗したらRSSの本文にフォールバック）
    st('記事全文を取得中...');
    const fullBodyHtml = await fetchFullBody(item.link || item.url || '');
    const fullText = fullBodyHtml
      ? extractText(fullBodyHtml)
      : extractText(item.content || item.description || '');
    const slides = buildSlides(item.title, fullText);
    setProgress(10);

    $('canvas-wrap').style.display = 'block';

    // 音声 + 画像を準備
    const prepared = await prepareSlides(slides);
    setProgress(45);

    // MP4エンコード
    videoBlob = await encodeMP4(prepared);
    setProgress(100);

    const sizeMB = (videoBlob.size / 1024 / 1024).toFixed(1);
    const durSec = Math.round(prepared.reduce((a, p) => a + p.durationSec, 0));
    st(`完成！（MP4 / ${sizeMB}MB / ${durSec}秒 / 音声+AI背景付き）`);
    $('dl-btn').style.display = 'inline-block';

  } catch (err) {
    console.error(err);
    st(`エラー: ${err.message}`);
    $('progress-wrap').style.display = 'none';
  }
  btn.disabled = false;
};

window.downloadVideo = function() {
  if (!videoBlob) return;
  const url = URL.createObjectURL(videoBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `reel_${new Date().toISOString().slice(0, 10)}.mp4`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
};
</script>
