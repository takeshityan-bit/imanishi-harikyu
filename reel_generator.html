<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>noteリール生成 | takeshityan</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  background: #0e0e0e; color: #fff; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; padding: 52px 20px 60px;
}
.badge { font-size: 11px; color: #555; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; }
h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.sub { font-size: 13px; color: #555; margin-bottom: 40px; }
#gen-btn {
  background: #fff; color: #0e0e0e; border: none; padding: 15px 40px;
  border-radius: 100px; font-size: 15px; font-weight: 700; cursor: pointer;
  margin-bottom: 22px; transition: background 0.15s, transform 0.1s;
}
#gen-btn:hover:not(:disabled) { background: #e8e8e8; transform: translateY(-1px); }
#gen-btn:disabled { opacity: 0.25; cursor: default; }
#status { font-size: 13px; color: #666; margin-bottom: 24px; min-height: 18px; text-align: center; }
.progress-bar-wrap {
  width: 270px; height: 3px; background: #222; border-radius: 100px;
  margin-bottom: 24px; overflow: hidden; display: none;
}
.progress-bar { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 100px; transition: width 0.3s; width: 0%; }
.canvas-wrap { position: relative; margin-bottom: 24px; display: none; }
canvas { width: 270px; height: 480px; border-radius: 18px; display: block; box-shadow: 0 24px 80px rgba(0,0,0,0.7); }
.slide-info {
  position: absolute; bottom: 14px; right: 14px;
  background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.85);
  font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 100px;
}
#dl-btn {
  background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none;
  padding: 15px 40px; border-radius: 100px; font-size: 15px; font-weight: 700;
  cursor: pointer; display: none; margin-bottom: 16px;
}
#dl-btn:hover { opacity: 0.88; }
.note-text { font-size: 11px; color: #3a3a3a; text-align: center; line-height: 1.8; margin-top: 8px; max-width: 320px; }
</style>
</head>
<body>

<div class="badge">@takeshityan</div>
<h1>noteリール生成</h1>
<p class="sub">最新記事をワンタップでリール動画に（音声+AI背景）</p>

<button id="gen-btn" onclick="generate()">リールを生成する</button>
<div id="status"></div>
<div class="progress-bar-wrap" id="progress-wrap">
  <div class="progress-bar" id="progress-bar"></div>
</div>
<div class="canvas-wrap" id="canvas-wrap">
  <canvas id="canvas" width="1080" height="1920"></canvas>
  <div class="slide-info" id="slide-info"></div>
</div>
<button id="dl-btn" onclick="downloadVideo()">動画をダウンロード</button>
<p class="note-text">
  http://localhost:8080/reel_generator.html で開いてください<br>
  Chrome推奨 / 音声付きMP4 / iPhone対応
</p>

<script type="module">
import { Muxer, ArrayBufferTarget } from 'https://cdn.jsdelivr.net/npm/mp4-muxer@5.1.3/+esm';

const CANVAS_W = 1080;
const CANVAS_H = 1920;
const FPS = 30;
const AUDIO_SR = 44100;
const NOTE_USER = 'takeshityan';

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
let videoBlob = null;

const $ = id => document.getElementById(id);
const st = msg => { $('status').textContent = msg; };
function setProgress(pct) {
  $('progress-bar').style.width = pct + '%';
  $('progress-wrap').style.display = 'block';
}

// ==== テキスト折り返し ====
function wrapText(text, x, y, maxW, lineH, maxLines, color) {
  ctx.fillStyle = color;
  let drawn = 0;
  for (const line of text.split('\n')) {
    if (!line.trim()) { y += lineH * 0.5; continue; }
    let cur = '';
    for (const ch of line) {
      const test = cur + ch;
      if (ctx.measureText(test).width > maxW && cur) {
        if (drawn++ < maxLines) ctx.fillText(cur, x, y);
        y += lineH; cur = ch;
      } else cur = test;
    }
    if (cur && drawn++ < maxLines) ctx.fillText(cur, x, y);
    y += lineH;
  }
}

// ==== スライド描画 ====
function drawSlide(bgImg, text, type) {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

  // AI背景画像
  if (bgImg) {
    ctx.drawImage(bgImg, 0, 0, CANVAS_W, CANVAS_H);
  } else {
    const g = ctx.createLinearGradient(0, 0, CANVAS_W, CANVAS_H);
    g.addColorStop(0, '#e0f7fa'); g.addColorStop(1, '#80cbc4');
    ctx.fillStyle = g; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  }

  // 薄いオーバーレイ（文字の読みやすさ）
  ctx.fillStyle = 'rgba(0,0,0,0.30)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,0,0,0.7)'; ctx.shadowBlur = 16; ctx.shadowOffsetY = 3;

  if (type === 'title') {
    ctx.font = '500 36px -apple-system, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText('最新note', CANVAS_W / 2, 720);
    ctx.font = 'bold 80px -apple-system, sans-serif';
    wrapText(text, CANVAS_W/2, 850, 920, 110, 5, '#ffffff');
  } else if (type === 'cta') {
    ctx.font = 'bold 70px -apple-system, sans-serif';
    ctx.fillStyle = '#FFD700';
    ctx.fillText('続きはnoteで読む', CANVAS_W/2, 850);
    ctx.font = '600 44px -apple-system, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.fillText('note.com/takeshityan', CANVAS_W/2, 960);
    ctx.font = '500 38px -apple-system, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText(`@${NOTE_USER}`, CANVAS_W/2, 1050);
  } else if (type === 'hook') {
    ctx.font = '500 36px -apple-system, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fillText('今日のテーマ', CANVAS_W/2, 700);
    ctx.font = 'bold 88px -apple-system, sans-serif';
    wrapText(text, CANVAS_W/2, 850, 920, 120, 5, '#FFD700');
  } else if (type === 'part') {
    ctx.font = 'bold 120px -apple-system, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText(text, CANVAS_W/2, CANVAS_H/2 + 40);
  } else {
    ctx.font = '600 80px -apple-system, sans-serif';
    wrapText(text, CANVAS_W/2, 600, 920, 110, 12, '#ffffff');
  }
  ctx.shadowBlur = 0;
}

// ==== RSS取得（記事一覧 + keyを取得） ====
async function fetchLatestArticle() {
  st('最新記事を取得中...');
  const api = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(`https://note.com/${NOTE_USER}/rss`)}`;
  const res = await fetch(api);
  if (!res.ok) throw new Error('RSS取得に失敗しました');
  const data = await res.json();
  if (data.status !== 'ok' || !data.items?.length) throw new Error('記事が見つかりません');
  return data.items[0];
}

// ==== note APIで全文取得 ====
async function fetchFullBody(articleUrl) {
  // URLからkeyを抽出 (例: https://note.com/takeshityan/n/nXXXXX → nXXXXX)
  const match = articleUrl.match(/\/n\/([a-zA-Z0-9]+)/);
  if (!match) return null;
  const key = match[1];
  try {
    const res = await fetch(`/note_body?key=${key}`);
    if (!res.ok) return null;
    const data = await res.json();
    return data?.data?.body || null;
  } catch { return null; }
}

function extractText(html) {
  return new DOMParser().parseFromString(html.replace(/<br\s*\/?>/gi, '\n'), 'text/html').body.textContent.trim();
}

// ==== 台本構築：段落単位で自然な区切りを作る ====
function buildScript(fullText) {
  // 改行で段落に分割
  const paragraphs = fullText
    .split(/\n+/)
    .map(p => p.trim())
    .filter(p => p.length > 8);

  if (!paragraphs.length) return [fullText];

  // 段落を意味のあるチャンクに結合（1チャンク = 読み上げ約8〜12秒 = 60〜90文字目安）
  const MAX_CHARS = 85;
  const chunks = [];
  let buf = '';

  for (const para of paragraphs) {
    // 段落が長い場合は。！？で分割してから処理
    const sentences = para.split(/(?<=[。！？])/g).map(s => s.trim()).filter(s => s.length > 3);
    for (const sent of sentences) {
      if ((buf + sent).length <= MAX_CHARS) {
        buf += sent;
      } else {
        if (buf) chunks.push(buf.trim());
        // 1文が長すぎる場合もそのまま入れる
        buf = sent.length > MAX_CHARS ? sent.slice(0, MAX_CHARS) : sent;
      }
    }
    // 段落の終わりでチャンクを区切る
    if (buf) {
      chunks.push(buf.trim());
      buf = '';
    }
  }
  if (buf.trim()) chunks.push(buf.trim());
  return chunks;
}

function buildSlides(title, fullText) {
  const slides = [{ type: 'title', text: title }];

  // hookスライド：タイトルから「〇〇で悩んでいませんか？」を生成
  const hookBase = title
    .replace(/――.*$/, '')           // ――以降を削除
    .replace(/[、。！？]/g, '')
    .replace(/[　 ]*[をにはがのもでてや].{0,10}$/, '')
    .slice(0, 22);
  slides.push({ type: 'hook', text: hookBase + 'で\n悩んでいませんか？' });

  // 台本を段落単位で構築
  const chunks = buildScript(fullText);

  // 120秒に収まる目安：1チャンク約8秒 → 最大13チャンク = 104秒 + タイトル+hook+cta約15秒 = 119秒
  const MAX_CHUNKS = 13;
  chunks.slice(0, MAX_CHUNKS).forEach(chunk => {
    slides.push({ type: 'body', text: chunk });
  });

  slides.push({ type: 'cta', text: '続きはnoteで読む' });
  return slides;
}

// ==== AI背景画像の取得（ローカルプロキシ経由 → CORS問題なし） ====
async function fetchBgImage(text, seed) {
  const prompt = `${text.slice(0, 80)}, realistic photo, soft natural light, warm tone, high quality photography`;
  const url = `/img?prompt=${encodeURIComponent(prompt)}&seed=${seed}`;
  try {
    const res = await fetch(url);
    if (!res.ok) return null;
    const blob = await res.blob();
    const objUrl = URL.createObjectURL(blob);
    return await new Promise((resolve) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => resolve(null);
      img.src = objUrl;
    });
  } catch { return null; }
}

// ==== TTS音声取得 → デコード ====
async function fetchAndDecodeTTS(text) {
  const trimmed = text.replace(/\n/g, '。').slice(0, 180);
  const res = await fetch(`/tts?q=${encodeURIComponent(trimmed)}`);
  if (!res.ok) throw new Error('TTS取得失敗');
  const arrayBuf = await res.arrayBuffer();
  // デコード → 44100Hz mono
  const offCtx = new OfflineAudioContext(1, 1, AUDIO_SR);
  const decoded = await offCtx.decodeAudioData(arrayBuf);
  if (decoded.sampleRate === AUDIO_SR) return decoded.getChannelData(0);
  const resampleCtx = new OfflineAudioContext(1, Math.ceil(decoded.duration * AUDIO_SR), AUDIO_SR);
  const src = resampleCtx.createBufferSource();
  src.buffer = decoded; src.connect(resampleCtx.destination); src.start();
  return (await resampleCtx.startRendering()).getChannelData(0);
}

function silencePCM(sec) { return new Float32Array(Math.ceil(sec * AUDIO_SR)); }

// ==== 全スライドの音声+画像を準備（60秒以内に収める） ====
async function prepareSlides(slides) {
  const results = [];
  const MAX_DURATION = 118; // 120秒（2分）リール制限に余裕

  for (let i = 0; i < slides.length; i++) {
    const s = slides[i];
    st(`準備中... (${i + 1} / ${slides.length})`);

    {
      const ttsText = s.type === 'cta' ? '続きはnoteで読む。たけしちゃん' : s.text;
      let pcm;
      try {
        st(`音声を生成中... (${i + 1} / ${slides.length})`);
        pcm = await fetchAndDecodeTTS(ttsText);
      } catch (e) {
        console.warn('TTS failed:', e);
        pcm = silencePCM(4);
      }

      // 0.5秒の余白を追加
      const silence = silencePCM(0.5);
      const combined = new Float32Array(pcm.length + silence.length);
      combined.set(pcm); combined.set(silence, pcm.length);

      // 60秒超えそうなら残りをスキップ
      const currentTotal = results.reduce((a, r) => a + r.durationSec, 0) + combined.length / AUDIO_SR;
      if (currentTotal > MAX_DURATION && results.length > 0) {
        // CTAだけは入れる（最後のスライドならOK）
        if (s.type !== 'cta') {
          setProgress(10 + Math.round((i / slides.length) * 30));
          continue;
        }
      }

      // 背景画像取得
      let bgImg = null;
      st(`背景画像を生成中... (${i + 1} / ${slides.length})`);
      bgImg = await fetchBgImage(s.text, i * 13 + 7);

      results.push({ pcm: combined, durationSec: combined.length / AUDIO_SR, bgImg, text: s.text, type: s.type });
    }

    setProgress(10 + Math.round((i / slides.length) * 30));
  }

  return results;
}

// ==== MP4エンコード（映像 + 音声） ====
async function encodeMP4(prepared) {
  const target = new ArrayBufferTarget();

  // 音声全体を結合
  const totalAudioLen = prepared.reduce((a, p) => a + p.pcm.length, 0);
  const fullAudio = new Float32Array(totalAudioLen);
  let offset = 0;
  for (const p of prepared) { fullAudio.set(p.pcm, offset); offset += p.pcm.length; }

  const totalDurationSec = totalAudioLen / AUDIO_SR;
  const totalVideoFrames = Math.ceil(totalDurationSec * FPS);

  const muxer = new Muxer({
    target,
    video: { codec: 'avc', width: CANVAS_W, height: CANVAS_H },
    audio: { codec: 'aac', numberOfChannels: 1, sampleRate: AUDIO_SR },
    fastStart: 'in-memory',
  });

  const videoEncoder = new VideoEncoder({
    output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
    error: (e) => { throw e; },
  });
  videoEncoder.configure({
    codec: 'avc1.640028',
    width: CANVAS_W, height: CANVAS_H,
    bitrate: 4_000_000, framerate: FPS,
  });

  const audioEncoder = new AudioEncoder({
    output: (chunk, meta) => muxer.addAudioChunk(chunk, meta),
    error: (e) => { throw e; },
  });
  audioEncoder.configure({
    codec: 'mp4a.40.2',
    numberOfChannels: 1,
    sampleRate: AUDIO_SR,
    bitrate: 128_000,
  });

  // ==== 音声エンコード ====
  st('音声をエンコード中...');
  const AUDIO_CHUNK = 1024;
  for (let i = 0; i < fullAudio.length; i += AUDIO_CHUNK) {
    const len = Math.min(AUDIO_CHUNK, fullAudio.length - i);
    const chunk = fullAudio.slice(i, i + len);
    const audioData = new AudioData({
      format: 'f32-planar',
      sampleRate: AUDIO_SR,
      numberOfFrames: chunk.length,
      numberOfChannels: 1,
      timestamp: Math.round((i / AUDIO_SR) * 1_000_000),
      data: chunk,
    });
    audioEncoder.encode(audioData);
    audioData.close();

    if (i % (AUDIO_CHUNK * 100) === 0) {
      await audioEncoder.flush();
      await new Promise(r => setTimeout(r, 0));
    }
  }
  await audioEncoder.flush();

  // ==== 映像エンコード ====
  st('映像をエンコード中...');
  let frameCount = 0;
  let accTime = 0;

  for (let si = 0; si < prepared.length; si++) {
    const p = prepared[si];
    drawSlide(p.bgImg, p.text, p.type);
    $('slide-info').textContent = `${si + 1} / ${prepared.length}`;

    const numFrames = Math.ceil(p.durationSec * FPS);
    for (let f = 0; f < numFrames; f++) {
      const timestamp = Math.round((accTime + f / FPS) * 1_000_000);
      const frame = new VideoFrame(canvas, { timestamp, duration: Math.round(1_000_000 / FPS) });
      videoEncoder.encode(frame, { keyFrame: f === 0 });
      frame.close();
      frameCount++;

      if (f % 15 === 14) {
        await videoEncoder.flush();
        setProgress(50 + Math.round((frameCount / totalVideoFrames) * 45));
        await new Promise(r => setTimeout(r, 0));
      }
    }
    accTime += p.durationSec;
  }

  await videoEncoder.flush();
  videoEncoder.close();
  audioEncoder.close();
  muxer.finalize();

  return new Blob([target.buffer], { type: 'video/mp4' });
}

// ==== メイン ====
window.generate = async function() {
  const btn = $('gen-btn');
  btn.disabled = true; videoBlob = null;
  $('dl-btn').style.display = 'none';
  $('canvas-wrap').style.display = 'none';
  $('progress-wrap').style.display = 'block';
  setProgress(5);

  try {
    if (typeof VideoEncoder === 'undefined' || typeof AudioEncoder === 'undefined')
      throw new Error('Chromeで開いてください（WebCodecs必須）');

    const item = await fetchLatestArticle();
    // note APIで全文取得を試みる（失敗したらRSSの本文にフォールバック）
    st('記事全文を取得中...');
    const fullBodyHtml = await fetchFullBody(item.link || item.url || '');
    const fullText = fullBodyHtml
      ? extractText(fullBodyHtml)
      : extractText(item.content || item.description || '');
    const slides = buildSlides(item.title, fullText);
    setProgress(10);

    $('canvas-wrap').style.display = 'block';

    // 音声 + 画像を準備
    const prepared = await prepareSlides(slides);
    setProgress(45);

    // MP4エンコード
    videoBlob = await encodeMP4(prepared);
    setProgress(100);

    const sizeMB = (videoBlob.size / 1024 / 1024).toFixed(1);
    const durSec = Math.round(prepared.reduce((a, p) => a + p.durationSec, 0));
    st(`完成！（MP4 / ${sizeMB}MB / ${durSec}秒 / 音声+AI背景付き）`);
    $('dl-btn').style.display = 'inline-block';

  } catch (err) {
    console.error(err);
    st(`エラー: ${err.message}`);
    $('progress-wrap').style.display = 'none';
  }
  btn.disabled = false;
};

window.downloadVideo = function() {
  if (!videoBlob) return;
  const url = URL.createObjectURL(videoBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `reel_${new Date().toISOString().slice(0, 10)}.mp4`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
};
</script>
</body>
</html>
